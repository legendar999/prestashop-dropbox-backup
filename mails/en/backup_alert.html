<html>
<body style="font-family: Arial, Helvetica, sans-serif; font-size: 14px; color: #222;">
<table style="width: 100%; max-width: 600px; margin: 0 auto; border-collapse: collapse;">
    <tr>
        <td style="padding: 16px; background-color: #b00020; color: #ffffff; font-size: 16px; font-weight: bold;">
            {shop_name} — backup FAILED
        </td>
    </tr>
    <tr>
        <td style="padding: 16px; border: 1px solid #e0e0e0;">
            <p>The nightly backup (run #{run_id}) ended with an error at {date}:</p>
            <p style="padding: 12px; background-color: #f6f6f6; border-left: 4px solid #b00020; font-family: monospace;">{error}</p>
            <p>Check the back office: Advanced Parameters &gt; Akva Backup (recent runs, Dropbox connection state).
            The next scheduled run will start on schedule; this record stays in the history.</p>
        </td>
    </tr>
</table>
</body>
</html>
